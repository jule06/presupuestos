spring.application.name=proyectopresupuesto-backend

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/proyectopresupuesto}
spring.datasource.username=${DATABASE_USER:proyectopresupuesto}
spring.datasource.password=${DATABASE_PASSWORD:proyectopresupuesto}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:cambia-esto-en-produccion-secreto-muy-largo-y-seguro-123456}
jwt.expiration=86400000

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID}

# Server
server.port=8080

# Logging
logging.level.com.proyectopresupuesto=INFO
