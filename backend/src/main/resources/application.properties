spring.application.name=proyectopresupuesto-backend

# Database
#pring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/proyectopresupuesto}
#spring.datasource.username=${DATABASE_USER:proyectopresupuesto}
#spring.datasource.password=${DATABASE_PASSWORD:proyectopresupuesto}
#spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:cambia-esto-en-produccion-secreto-muy-largo-y-seguro-123456}
jwt.expiration=86400000

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID}

# Server
server.port=8080

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# App
app.frontend-url=${FRONTEND_URL:http://localhost}

# Logging
logging.level.com.proyectopresupuesto=INFO
