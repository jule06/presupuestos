services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: proyectopresupuesto
      POSTGRES_USER: proyectopresupuesto
      POSTGRES_PASSWORD: proyectopresupuesto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proyectopresupuesto"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/proyectopresupuesto
      DATABASE_USER: proyectopresupuesto
      DATABASE_PASSWORD: proyectopresupuesto
      JWT_SECRET: ${JWT_SECRET:-proyectopresupuesto-secret-muy-largo-y-seguro-para-produccion-2024}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
